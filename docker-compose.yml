services:
  postgres:
    image: postgres:16
    container_name: sheet-music-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sheet_music_pgdata:/var/lib/postgresql/data

volumes:
  sheet_music_pgdata:
