services:
  postgres:
    image: postgres:16
    container_name: sheet-music-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sheet_music_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ocr-service:
    build: ./ocr-service
    container_name: sheet-music-ocr
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build: .
    container_name: sheet-music-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      PORT: ${PORT:-8080}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:8001}
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_started
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: sheet-music-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sheet_music_pgdata:
  uploads:
