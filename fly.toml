# fly.toml app configuration file generated for worship-sheet on 2026-06-08T23:17:49+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'worship-sheet'
primary_region = 'nrt'

[build]

[[mounts]]
  source = 'uploads_data'
  destination = '/app/uploads'

[http_service]
  internal_port = 8080
  force_https = true
  # 유휴 시 완전 종료(stop) 대신 메모리 스냅샷으로 정지(suspend)한다.
  # 완전 종료 후 ~17초 Spring Boot 콜드부팅 대신, 요청 시 스냅샷에서 수 초 내 재개되어
  # "다시 접속하면 죽어있는" 체감을 없앤다. min=0 유지로 항상 켜두기보다 저렴.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
