spring:
  application:
    name: sheetmusic
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sheet_music}
    username: ${SPRING_DATASOURCE_USERNAME:sheet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sheet_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # 지연 로딩 컬렉션(sheets, files 등)을 IN 절로 배치 로딩해 N+1 완화
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-please-override-in-production-min-32-bytes}

registration:
  # 회원가입 초대코드. 미설정(blank)이면 가입이 완전히 비활성화된다(fail-closed).
  # 로컬/운영 모두 REGISTRATION_INVITE_CODE 환경변수로 지정해야 가입이 열린다.
  # (기본값을 코드에 박아두면 그 값이 공개 초대코드가 되어버리므로 일부러 비워둔다.)
  invite-code: ${REGISTRATION_INVITE_CODE:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:./uploads}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:}
