spring:
  application:
    name: sheetmusic
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sheet_music}
    username: ${SPRING_DATASOURCE_USERNAME:sheet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sheet_pass}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: ${PORT:8080}

ocr:
  service:
    url: ${OCR_SERVICE_URL:}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:./uploads}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:}
