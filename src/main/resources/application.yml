spring:
  application:
    name: sheetmusic
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sheet_music}
    username: ${SPRING_DATASOURCE_USERNAME:sheet_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sheet_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Fly.io 는 유휴 시 머신을 완전히 정지하지 않고 메모리 스냅샷으로 정지(suspend)한다.
      # 정지된 동안 Supabase 쪽에서 유휴 커넥션을 이미 끊어버릴 수 있는데, 재개 시
      # HikariCP 풀은 그 죽은 커넥션을 여전히 idle 로 들고 있어 다음 요청(대표적으로 로그인)이
      # "Connection is not available" 로 30초 넘게 대기하다 실패하는 문제가 있었다.
      # minimum-idle=0 으로 유휴 커넥션을 붙들고 있지 않게 하고, idle-timeout/max-lifetime 을
      # 짧게 잡아 커넥션이 오래 방치되지 않게 한다. connection-timeout 도 줄여 죽은 커넥션을
      # 오래 기다리지 않고 빨리 실패(→ HikariCP 가 새 커넥션으로 교체)하도록 한다.
      minimum-idle: 0
      maximum-pool-size: 10
      idle-timeout: 60000
      max-lifetime: 270000
      connection-timeout: 10000
      keepalive-time: 120000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # 지연 로딩 컬렉션(sheets, files 등)을 IN 절로 배치 로딩해 N+1 완화
        default_batch_fetch_size: 100
    open-in-view: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-please-override-in-production-min-32-bytes}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    base-path: ${STORAGE_LOCAL_PATH:./uploads}
  r2:
    endpoint: ${R2_ENDPOINT:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    bucket: ${R2_BUCKET:}

logging:
  level:
    org.springframework.web: ${LOCAL_WEB_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${LOCAL_SQL_LOG_LEVEL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOCAL_SQL_BIND_LOG_LEVEL:WARN}
